<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fixed IP Checker</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;padding:20px}
.container{max-width:1200px;margin:auto}
textarea{width:100%;height:120px;padding:10px}
button{padding:10px 14px;margin-top:10px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer}
table{width:100%;margin-top:15px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #1f2937;font-size:13px}
.success{color:#22c55e;font-weight:bold}
.failed{color:#ef4444;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>🚀 FIXED IP CHECKER</h2>

<textarea id="ips">8.8.8.8
1.1.1.1
104.26.10.78</textarea>

<button onclick="run()">CHECK</button>

<table>
<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>ISP</th>
<th>Org</th>
<th>ASN</th>
<th>Country</th>
<th>Region</th>
<th>City</th>
<th>Message</th>
</tr>
</thead>

<tbody id="out"></tbody>
</table>

</div>

<script>

async function fetchWithFallback(ip){

// API 1
try{
let r = await fetch("https://ipwho.is/"+ip);
let d = await r.json();

if(d && d.success){
return build(ip,d);
}
}catch(e){}

// API 2 fallback
try{
let r = await fetch("https://ipapi.co/"+ip+"/json/");
let d = await r.json();

if(d && !d.error){
return {
ip,
status:"Success",
isp:d.org||"N/A",
org:d.org||"N/A",
asn:d.asn||"N/A",
country:d.country_name||"",
region:d.region||"",
city:d.city||"",
msg:"OK (API2)"
};
}
}catch(e){}

return {
ip,
status:"Failed",
isp:"N/A",
org:"N/A",
asn:"N/A",
country:"",
region:"",
city:"",
msg:"No data / blocked"
};
}

function build(ip,d){
return{
ip,
status:"Success",
isp:d.connection?.isp||"N/A",
org:d.connection?.org||"N/A",
asn:d.connection?.asn||"N/A",
country:d.country||"",
region:d.region||"",
city:d.city||"",
msg:"OK"
};
}

async function run(){

let ips=document.getElementById("ips")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

let out=document.getElementById("out");
out.innerHTML="";

for(let ip of ips){

let r = await fetchWithFallback(ip);

out.innerHTML += `
<tr>
<td>${r.ip}</td>
<td class="${r.status==="Success"?"success":"failed"}">${r.status}</td>
<td>${r.isp}</td>
<td>${r.org}</td>
<td>${r.asn}</td>
<td>${r.country}</td>
<td>${r.region}</td>
<td>${r.city}</td>
<td>${r.msg}</td>
</tr>`;
}

}

</script>

</body>
</html>
