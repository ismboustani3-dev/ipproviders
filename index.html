<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IP Provider Checker</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#f4f6fb;
        padding:20px;
    }

    .container{
        max-width:1200px;
        margin:auto;
        background:white;
        border-radius:10px;
        padding:20px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
        margin-bottom:15px;
        color:#111;
    }

    textarea{
        width:100%;
        height:180px;
        border:1px solid #ccc;
        border-radius:8px;
        padding:12px;
        resize:none;
        font-size:14px;
        outline:none;
    }

    .buttons{
        margin-top:15px;
        display:flex;
        gap:10px;
        align-items:center;
    }

    button{
        border:none;
        padding:12px 22px;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
        transition:0.2s;
    }

    .check-btn{
        background:#2563eb;
        color:white;
    }

    .check-btn:hover{
        background:#1d4ed8;
    }

    .csv-btn{
        background:#111827;
        color:white;
    }

    .csv-btn:hover{
        background:#000;
    }

    .tip{
        color:#6b7280;
        font-size:14px;
    }

    .table-container{
        overflow-x:auto;
        margin-top:25px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    thead{
        background:#0f172a;
        color:white;
    }

    th, td{
        padding:14px;
        text-align:left;
        border-bottom:1px solid #e5e7eb;
        font-size:14px;
    }

    tbody tr:hover{
        background:#f9fafb;
    }

    .success{
        color:green;
        font-weight:bold;
    }

    .failed{
        color:red;
        font-weight:bold;
    }

    .stats{
        margin-top:25px;
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
        gap:15px;
    }

    .card{
        background:#111827;
        color:white;
        padding:18px;
        border-radius:10px;
    }

    .card h3{
        margin-bottom:8px;
        font-size:15px;
        color:#9ca3af;
    }

    .card p{
        font-size:26px;
        font-weight:bold;
    }

    .footer{
        text-align:center;
        margin-top:20px;
        color:#6b7280;
        font-size:14px;
    }

    .progress-box{
        margin-top:20px;
        display:none;
    }

    .progress-bar{
        width:100%;
        height:24px;
        background:#ddd;
        border-radius:30px;
        overflow:hidden;
    }

    .progress{
        height:100%;
        width:0%;
        background:#2563eb;
        transition:0.3s;
    }

    .progress-text{
        margin-top:8px;
        font-size:14px;
        color:#444;
    }
</style>
</head>
<body>

<div class="container">

    <h1>IP Provider Checker</h1>

    <p style="margin-bottom:10px;color:#555;">
        Paste IP addresses (one per line)
    </p>

    <textarea id="ipInput">
54.38.193.115
54.37.82.44
37.123.98.2
104.206.148.58
192.99.198.53
170.130.202.238
51.81.187.39
5.135.109.51
51.195.146.50
104.206.108.50
    </textarea>

    <div class="buttons">
        <button class="check-btn" onclick="checkIPs()">Check</button>
        <button class="csv-btn" onclick="downloadCSV()">Download CSV</button>

        <span class="tip">
            Tip: You can paste comma-separated IPs too.
        </span>
    </div>

    <div class="progress-box" id="progressBox">
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <div class="progress-text" id="progressText">
            0%
        </div>
    </div>

    <div class="stats">
        <div class="card">
            <h3>Total IPs</h3>
            <p id="totalIPs">0</p>
        </div>

        <div class="card">
            <h3>Success</h3>
            <p id="successIPs">0</p>
        </div>

        <div class="card">
            <h3>Failed</h3>
            <p id="failedIPs">0</p>
        </div>

        <div class="card">
            <h3>Unique Providers</h3>
            <p id="providersCount">0</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>IP</th>
                    <th>Status</th>
                    <th>ISP</th>
                    <th>Organization</th>
                    <th>ASN</th>
                    <th>Country</th>
                    <th>Region</th>
                    <th>City</th>
                </tr>
            </thead>

            <tbody id="resultsBody"></tbody>
        </table>
    </div>

    <div class="footer">
        @By WMN-3
    </div>

</div>

<script>

let allResults = [];

async function checkIPs(){

    const input = document.getElementById("ipInput").value;

    let ips = input
        .replace(/,/g,"\n")
        .split("\n")
        .map(ip => ip.trim())
        .filter(ip => ip !== "");

    const tbody = document.getElementById("resultsBody");

    tbody.innerHTML = "";

    allResults = [];

    document.getElementById("progressBox").style.display = "block";

    let success = 0;
    let failed = 0;

    let providers = new Set();

    for(let i=0; i<ips.length; i++){

        const ip = ips[i];

        try{

            const response = await fetch(`https://ipwho.is/${ip}`);
            const data = await response.json();

            if(data.success){

                success++;

                providers.add(data.connection.isp);

                allResults.push({
                    ip: ip,
                    status: "Success",
                    isp: data.connection.isp || "N/A",
                    org: data.connection.org || "N/A",
                    asn: data.connection.asn || "N/A",
                    country: data.country || "N/A",
                    region: data.region || "N/A",
                    city: data.city || "N/A"
                });

                tbody.innerHTML += `
                    <tr>
                        <td>${ip}</td>
                        <td class="success">Success</td>
                        <td>${data.connection.isp || "N/A"}</td>
                        <td>${data.connection.org || "N/A"}</td>
                        <td>${data.connection.asn || "N/A"}</td>
                        <td>${data.country || "N/A"}</td>
                        <td>${data.region || "N/A"}</td>
                        <td>${data.city || "N/A"}</td>
                    </tr>
                `;

            }else{

                failed++;

                tbody.innerHTML += `
                    <tr>
                        <td>${ip}</td>
                        <td class="failed">Failed</td>
                        <td colspan="6">Invalid IP or API error</td>
                    </tr>
                `;
            }

        }catch(err){

            failed++;

            tbody.innerHTML += `
                <tr>
                    <td>${ip}</td>
                    <td class="failed">Failed</td>
                    <td colspan="6">Request failed</td>
                </tr>
            `;
        }

        let percent = Math.round(((i+1)/ips.length)*100);

        document.getElementById("progress").style.width = percent + "%";
        document.getElementById("progressText").innerText = percent + "%";

        document.getElementById("totalIPs").innerText = ips.length;
        document.getElementById("successIPs").innerText = success;
        document.getElementById("failedIPs").innerText = failed;
        document.getElementById("providersCount").innerText = providers.size;
    }
}

function downloadCSV(){

    if(allResults.length === 0){
        alert("No results.");
        return;
    }

    let csv =
`IP,Status,ISP,Organization,ASN,Country,Region,City\n`;

    allResults.forEach(r => {

        csv += `${r.ip},${r.status},${r.isp},${r.org},${r.asn},${r.country},${r.region},${r.city}\n`;

    });

    const blob = new Blob([csv], {type:'text/csv'});

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "ip_results.csv";

    a.click();
}

</script>

</body>
</html>
