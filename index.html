<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IP Checker Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

h1{
font-size:26px;
letter-spacing:1px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

textarea{
width:100%;
height:120px;
border:none;
outline:none;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
resize:none;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

.btn{
background:#3b82f6;
color:white;
}

.btn:hover{background:#2563eb}

.controls{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

input,select{
padding:8px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

th{
text-align:left;
padding:10px;
background:rgba(255,255,255,0.1);
}

td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.success{color:#22c55e;font-weight:bold;}
.failed{color:#ef4444;font-weight:bold;}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.box{
background:rgba(255,255,255,0.07);
padding:10px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>⚡ IP Dashboard</h1>
</div>

<div class="card">

<textarea id="ips">8.8.8.8
1.1.1.1
104.26.10.78</textarea>

<div class="controls">

<button class="btn" onclick="check()">Check IPs</button>

<input id="search" placeholder="Search..." onkeyup="render()">

<select id="filter" onchange="render()">
<option value="all">All</option>
<option value="success">Success</option>
<option value="failed">Failed</option>
</select>

</div>

<div class="stats">
<div class="box">Total <div id="t">0</div></div>
<div class="box">Success <div id="s">0</div></div>
<div class="box">Failed <div id="f">0</div></div>
</div>

<table>
<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>Provider</th>
<th>Country</th>
</tr>
</thead>

<tbody id="out"></tbody>
</table>

</div>

</div>

<script>

let data=[];

async function get(ip){
try{
let r=await fetch("https://ipwho.is/"+ip);
let d=await r.json();

if(d.success){
return{ip,status:"Success",provider:d.connection?.isp||"Unknown",country:d.country};
}
}catch{}
return{ip,status:"Failed",provider:"Error",country:""};
}

async function check(){

let ips=document.getElementById("ips").value.split("\n").map(x=>x.trim()).filter(Boolean);

data=[];

for(let ip of ips){
data.push(await get(ip));
}

render();
}

function render(){

let f=document.getElementById("filter").value;
let s=document.getElementById("search").value.toLowerCase();

let out=document.getElementById("out");
out.innerHTML="";

let list=data.filter(x=>{
let okFilter=f==="all"||x.status.toLowerCase()===f;
let okSearch=x.ip.includes(s)||x.provider.toLowerCase().includes(s);
return okFilter && okSearch;
});

list.forEach(x=>{
out.innerHTML+=`
<tr>
<td>${x.ip}</td>
<td class="${x.status==="Success"?"success":"failed"}">${x.status}</td>
<td>${x.provider}</td>
<td>${x.country}</td>
</tr>`;
});

document.getElementById("t").innerText=data.length;
document.getElementById("s").innerText=data.filter(x=>x.status==="Success").length;
document.getElementById("f").innerText=data.filter(x=>x.status==="Failed").length;
}

</script>

</body>
</html>
