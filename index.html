<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FINAL BOSS IP SYSTEM</title>

<style>
body{font-family:Arial;background:#0b1220;color:white;padding:20px}
.container{max-width:1400px;margin:auto;background:#111827;padding:15px;border-radius:10px}

textarea{width:100%;height:120px;padding:10px}

button,select{padding:8px;margin:5px;cursor:pointer}

table{width:100%;border-collapse:collapse;margin-top:15px}
td,th{padding:8px;border-bottom:1px solid #333}

.success{color:#22c55e}
.failed{color:#ef4444}

.badge{padding:3px 8px;border-radius:10px;background:#2563eb;font-size:12px}

.top{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

canvas{background:#0f172a;margin-top:15px;border-radius:10px}
</style>
</head>

<body>

<div class="container">

<h2>👑 FINAL BOSS IP INTELLIGENCE</h2>

<div class="top">

<button onclick="start()">START BOSS</button>
<button onclick="clearAll()">RESET</button>
<button onclick="exportCSV()">CSV</button>
<button onclick="toggleDark()">DARK</button>

<select id="filter" onchange="render()">
<option value="all">ALL</option>
<option value="success">SUCCESS</option>
<option value="failed">FAILED</option>
</select>

<small id="stats">0</small>

</div>

<textarea id="input">8.8.8.8
1.1.1.1
104.26.10.78
172.67.73.21
151.101.1.69</textarea>

<table>
<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>ISP</th>
<th>Country</th>
<th>Risk</th>
</tr>
</thead>
<tbody id="out"></tbody>
</table>

<canvas id="chart" height="120"></canvas>

</div>

<script>

let data = JSON.parse(localStorage.getItem("boss_ips")||"[]");

function save(){
localStorage.setItem("boss_ips",JSON.stringify(data));
}

// ===== Risk Engine (Boss AI) =====
function risk(isp=""){
isp=isp.toLowerCase();
let r=10;

if(isp.includes("amazon"))r+=10;
if(isp.includes("google"))r+=10;
if(isp.includes("microsoft"))r+=10;

if(isp.includes("hosting"))r+=30;
if(isp.includes("server"))r+=30;
if(isp.includes("datacenter"))r+=40;

return Math.min(r,100);
}

// ===== Worker Engine (parallel fake workers) =====
function worker(ip){
return new Promise(async res=>{
try{
let r=await fetch("https://ipwho.is/"+ip);
let d=await r.json();

if(d.success){
res({
ip,
status:"Success",
isp:d.connection?.isp||"Unknown",
country:d.country||"",
risk:risk(d.connection?.isp||"")
});
return;
}
}catch{}

res({ip,status:"Failed",isp:"Error",country:"",risk:100});
});
}

// ===== BOSS PIPELINE =====
async function start(){

let ips=document.getElementById("input")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

data=[];

let queue=[];

// streaming system (no freeze)
for(let ip of ips){

queue.push(ip);

if(queue.length>=5){
await process(queue);
queue=[];
}
}

if(queue.length) await process(queue);

save();
render();
drawChart();
}

// batch processor
async function process(batch){

let tasks=batch.map(ip=>{
return worker(ip);
});

let res=await Promise.all(tasks);
data.push(...res);
updateStats();
render();
}

// ===== UI =====
function render(){

let f=document.getElementById("filter").value;
let out=document.getElementById("out");
out.innerHTML="";

let list=data.filter(x=>{
if(f==="all")return true;
return x.status.toLowerCase()===f;
});

list.forEach(x=>{
out.innerHTML+=`
<tr>
<td>${x.ip}</td>
<td class="${x.status==="Success"?"success":"failed"}">${x.status}</td>
<td>${x.isp}</td>
<td>${x.country}</td>
<td><span class="badge">${x.risk}</span></td>
</tr>`;
});
}

function updateStats(){
document.getElementById("stats").innerText=
`TOTAL:${data.length} | OK:${data.filter(x=>x.status==="Success").length} | FAIL:${data.filter(x=>x.status==="Failed").length}`;
}

// ===== SIMPLE RISK GRAPH =====
function drawChart(){

let c=document.getElementById("chart");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,c.width,c.height);

let max=100;
let w=10;

data.slice(0,50).forEach((x,i)=>{

let h=(x.risk/max)*100;

ctx.fillStyle="#3b82f6";
ctx.fillRect(i*w,100-h,w-2,h);

});

}

// ===== EXPORT =====
function exportCSV(){
let c="IP,Status,ISP,Country,Risk\n";
data.forEach(x=>{
c+=`${x.ip},${x.status},${x.isp},${x.country},${x.risk}\n`;
});
let b=new Blob([c],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="boss_ips.csv";
a.click();
}

// ===== CLEAR =====
function clearAll(){
data=[];
save();
render();
drawChart();
updateStats();
}

function toggleDark(){
document.body.classList.toggle("dark");
}

render();
updateStats();
drawChart();

</script>

</body>
</html>
