<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>IP Provider Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    padding:20px;
    color:#111827;
}

.container{
    width:100%;
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

h1{
    margin-bottom:20px;
    font-size:38px;
    font-weight:bold;
}

textarea{
    width:280px;
    height:160px;
    border:2px solid #111827;
    border-radius:6px;
    padding:10px;
    resize:none;
    font-size:15px;
    outline:none;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:12px;
}

button{
    border:none;
    padding:12px 24px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

#checkBtn{
    background:#2563eb;
    color:#fff;
}

#checkBtn:hover{
    background:#1d4ed8;
}

#downloadBtn{
    background:#111827;
    color:#fff;
}

#downloadBtn:hover{
    background:#000;
}

.stats{
    margin-top:25px;
    border:1px solid #d1d5db;
    border-radius:10px;
    padding:20px;
    background:#fafafa;
}

.stats h2{
    margin-bottom:20px;
}

.stats p{
    margin-bottom:12px;
    font-size:18px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
    background:#fff;
}

thead{
    background:#0f172a;
    color:#fff;
}

th{
    padding:16px;
    text-align:left;
}

td{
    padding:14px 16px;
    border-bottom:1px solid #e5e7eb;
}

.success{
    color:green;
    font-weight:bold;
}

.failed{
    color:red;
    font-weight:bold;
}

.loading{
    color:#2563eb;
    font-weight:bold;
}

.provider-box,
.region-box{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.badge{
    background:#111827;
    color:#fff;
    padding:8px 12px;
    border-radius:30px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <h1>IP Provider Checker</h1>

    <textarea id="ipInput" placeholder="Enter one IP per line"></textarea>

    <div class="buttons">
        <button id="checkBtn">Check</button>
        <button id="downloadBtn">Download CSV</button>
    </div>

    <div class="stats">
        <h2>Statistics</h2>

        <p>Total: <span id="total">0</span></p>
        <p>Success: <span id="success">0</span></p>
        <p>Failed: <span id="failed">0</span></p>

        <h3 style="margin-top:25px;">Providers Count</h3>
        <div class="provider-box" id="providers"></div>

        <h3 style="margin-top:25px;">Regions Count</h3>
        <div class="region-box" id="regions"></div>

    </div>

    <table>
        <thead>
            <tr>
                <th>IP</th>
                <th>Status</th>
                <th>Provider</th>
                <th>Country</th>
                <th>Region</th>
                <th>City</th>
            </tr>
        </thead>

        <tbody id="results"></tbody>
    </table>

</div>

<script>

const ipInput = document.getElementById("ipInput");
const checkBtn = document.getElementById("checkBtn");
const results = document.getElementById("results");

const totalEl = document.getElementById("total");
const successEl = document.getElementById("success");
const failedEl = document.getElementById("failed");

const providersBox = document.getElementById("providers");
const regionsBox = document.getElementById("regions");

let csvData = [];

function isValidIP(ip){

    const regex =
    /^(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\.(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\.(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})\.(25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})$/;

    return regex.test(ip);
}

async function checkIP(ip){

    try{

        const response = await fetch(`https://ipwho.is/${ip}`);
        const data = await response.json();

        if(data.success === false){

            return {
                ip,
                status:"Failed",
                provider:"Invalid IP",
                country:"",
                region:"",
                city:""
            };
        }

        return {
            ip,
            status:"Success",
            provider:data.connection?.isp || "Unknown",
            country:data.country || "",
            region:data.region || "",
            city:data.city || ""
        };

    }catch(error){

        return {
            ip,
            status:"Failed",
            provider:"Error",
            country:"",
            region:"",
            city:""
        };
    }
}

checkBtn.addEventListener("click", async ()=>{

    results.innerHTML = "";
    providersBox.innerHTML = "";
    regionsBox.innerHTML = "";

    csvData = [];

    const ips = ipInput.value
        .split("\n")
        .map(ip => ip.trim())
        .filter(ip => ip !== "");

    totalEl.textContent = ips.length;

    let success = 0;
    let failed = 0;

    const providerCount = {};
    const regionCount = {};

    for(const ip of ips){

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${ip}</td>
            <td class="loading">Checking...</td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        `;

        results.appendChild(row);

        if(!isValidIP(ip)){

            row.innerHTML = `
                <td>${ip}</td>
                <td class="failed">Failed</td>
                <td>Invalid Format</td>
                <td></td>
                <td></td>
                <td></td>
            `;

            failed++;
            failedEl.textContent = failed;

            continue;
        }

        const data = await checkIP(ip);

        if(data.status === "Success"){

            success++;

            providerCount[data.provider] =
                (providerCount[data.provider] || 0) + 1;

            regionCount[data.region] =
                (regionCount[data.region] || 0) + 1;

        }else{
            failed++;
        }

        row.innerHTML = `
            <td>${data.ip}</td>
            <td class="${data.status === "Success" ? "success":"failed"}">
                ${data.status}
            </td>
            <td>${data.provider}</td>
            <td>${data.country}</td>
            <td>${data.region}</td>
            <td>${data.city}</td>
        `;

        csvData.push(data);

        successEl.textContent = success;
        failedEl.textContent = failed;
    }

    for(const provider in providerCount){

        const badge = document.createElement("div");
        badge.className = "badge";

        badge.innerText =
            `${provider}: ${providerCount[provider]}`;

        providersBox.appendChild(badge);
    }

    for(const region in regionCount){

        const badge = document.createElement("div");
        badge.className = "badge";

        badge.innerText =
            `${region}: ${regionCount[region]}`;

        regionsBox.appendChild(badge);
    }

});

document.getElementById("downloadBtn")
.addEventListener("click", ()=>{

    if(csvData.length === 0){
        alert("No data to download");
        return;
    }

    let csv =
    "IP,Status,Provider,Country,Region,City\n";

    csvData.forEach(item => {

        csv +=
        `${item.ip},${item.status},${item.provider},${item.country},${item.region},${item.city}\n`;

    });

    const blob =
        new Blob([csv], {type:"text/csv"});

    const url =
        window.URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "ip_results.csv";

    a.click();

    window.URL.revokeObjectURL(url);
});

</script>

</body>
</html>
