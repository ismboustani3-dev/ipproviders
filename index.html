<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP Provider Checker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:25px;
}

.container{
    width:100%;
    background:white;
    padding:20px;
    border-radius:8px;
}

h1{
    margin-bottom:15px;
    color:#000;
}

.label{
    margin-bottom:10px;
    color:#444;
}

textarea{
    width:100%;
    height:170px;
    border:1px solid #ccc;
    border-radius:6px;
    padding:10px;
    font-size:14px;
    resize:vertical;
}

.buttons{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:10px;
}

button{
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    font-size:14px;
}

.check-btn{
    background:#2563eb;
}

.download-btn{
    background:#0f172a;
}

.tip{
    color:#666;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
}

th{
    background:#0f172a;
    color:white;
    padding:12px 10px;
    text-align:left;
    font-size:14px;
}

td{
    padding:12px 10px;
    border-bottom:1px solid #ddd;
    font-size:14px;
}

.success{
    color:green;
    font-weight:bold;
}

.failed{
    color:red;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:18px;
    font-size:14px;
}

.footer b{
    color:#000;
}

.progress-container{
    width:100%;
    height:22px;
    background:#ddd;
    border-radius:30px;
    overflow:hidden;
    margin-top:20px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#2563eb;
    color:white;
    text-align:center;
    line-height:22px;
    font-size:12px;
    transition:0.2s;
}

</style>
</head>

<body>

<div class="container">

    <h1>IP Provider Checker</h1>

    <div class="label">
        Paste IP addresses (one per line)
    </div>

    <textarea id="ips">

54.38.193.115
54.37.82.44
37.123.98.2
104.206.148.58
192.99.198.53
170.130.202.238
51.81.187.39
5.135.109.51
51.195.146.50
104.206.108.50

    </textarea>

    <div class="buttons">

        <button
            class="check-btn"
            onclick="checkIPs()"
        >
            Check
        </button>

        <button
            class="download-btn"
            onclick="downloadCSV()"
        >
            Download CSV
        </button>

        <div class="tip">
            Tip: You can paste comma-separated IPs too.
        </div>

    </div>

    <div class="progress-container">

        <div
            class="progress-bar"
            id="progressBar"
        >
            0%
        </div>

    </div>

    <table>

        <thead>

            <tr>
                <th>IP</th>
                <th>Status</th>
                <th>ISP</th>
                <th>Organization</th>
                <th>ASN</th>
                <th>Country</th>
                <th>Region</th>
                <th>City</th>
                <th>Message</th>
            </tr>

        </thead>

        <tbody id="tbody"></tbody>

    </table>

    <div class="footer">
        @By <b>WMN-3</b>
    </div>

</div>

<script>

let results = [];

async function checkIPs(){

    const ips = document
        .getElementById("ips")
        .value
        .split(/\n|,/)
        .map(ip => ip.trim())
        .filter(ip => ip);

    if(!ips.length){

        alert("Paste IPs");

        return;
    }

    document.getElementById("tbody").innerHTML = "";

    results = [];

    let checked = 0;

    for(const ip of ips){

        try{

            const response = await fetch(
                `https://corsproxy.io/?https://ipwho.is/${ip}`
            );

            const data = await response.json();

            checked++;

            updateProgress(
                Math.floor(
                    (checked / ips.length) * 100
                )
            );

            if(data.success !== false){

                const row = {

                    ip:data.ip || ip,
                    status:"Success",
                    isp:data.connection?.isp || "-",
                    org:data.connection?.org || "-",
                    asn:data.connection?.asn || "-",
                    country:data.country || "-",
                    region:data.region || "-",
                    city:data.city || "-",
                    message:"OK"
                };

                results.push(row);

                addRow(row);

            }else{

                addError(ip);
            }

        }catch(e){

            addError(ip);
        }
    }
}

function addRow(row){

    document.getElementById("tbody").innerHTML += `

    <tr>

        <td>${row.ip}</td>

        <td class="success">
            ${row.status}
        </td>

        <td>${row.isp}</td>

        <td>${row.org}</td>

        <td>${row.asn}</td>

        <td>${row.country}</td>

        <td>${row.region}</td>

        <td>${row.city}</td>

        <td>${row.message}</td>

    </tr>

    `;
}

function addError(ip){

    document.getElementById("tbody").innerHTML += `

    <tr>

        <td>${ip}</td>

        <td class="failed">
            Failed
        </td>

        <td colspan="7">
            API Error / Invalid IP
        </td>

    </tr>

    `;
}

function updateProgress(percent){

    const bar =
        document.getElementById("progressBar");

    bar.style.width =
        percent + "%";

    bar.innerText =
        percent + "%";
}

function downloadCSV(){

    if(!results.length){

        alert("No results");

        return;
    }

    let csv =
`IP,Status,ISP,Organization,ASN,Country,Region,City,Message\n`;

    results.forEach(r => {

        csv +=
`${r.ip},${r.status},${r.isp},${r.org},${r.asn},${r.country},${r.region},${r.city},${r.message}\n`;

    });

    const blob = new Blob(
        [csv],
        {
            type:"text/csv"
        }
    );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download =
        "results.csv";

    a.click();

    URL.revokeObjectURL(url);
}

window.onload = checkIPs;

</script>

</body>
</html>
