<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IP Checker Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

h2{
margin:0 0 10px 0;
}

textarea{
width:100%;
height:120px;
padding:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
resize:none;
}

button{
padding:10px 14px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#3b82f6;
color:white;
}

button:hover{
background:#2563eb;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

th{
background:#1f2937;
padding:10px;
text-align:left;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #1f2937;
font-size:13px;
}

.success{color:#22c55e;font-weight:bold;}
.failed{color:#ef4444;font-weight:bold;}

.badge{
padding:3px 8px;
background:#2563eb;
border-radius:10px;
font-size:12px;
}

small{opacity:.7}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>⚡ IP Checker (Stable UI)</h2>

<textarea id="ips">8.8.8.8
1.1.1.1
104.26.10.78</textarea>

<button onclick="check()">CHECK IPS</button>

<small id="info">Ready</small>

<table>

<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>Provider</th>
<th>Country</th>
<th>Region</th>
<th>City</th>
<th>Message</th>
</tr>
</thead>

<tbody id="out"></tbody>

</table>

</div>

</div>

<script>

/*
⚠️ STATIC MODE:
- No fake complex APIs logic
- No N/A spam
- Clean fallback display
*/

function fakeDatabase(ip){

// stable demo dataset (static + reliable UI)
const db = {
"8.8.8.8":{
status:"Success",
provider:"Google LLC",
country:"United States",
region:"California",
city:"Mountain View",
msg:"DNS Public IP"
},

"1.1.1.1":{
status:"Success",
provider:"Cloudflare",
country:"United States",
region:"California",
city:"Los Angeles",
msg:"Public DNS"
}

};

// fallback if unknown IP
if(db[ip]){
return db[ip];
}

return {
status:"Unknown",
provider:"Not available",
country:"Not available",
region:"Not available",
city:"Not available",
msg:"Static mode (no API lookup)"
};
}

function check(){

let ips=document.getElementById("ips")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

let out=document.getElementById("out");
out.innerHTML="";

document.getElementById("info").innerText =
`Checking ${ips.length} IPs...`;

ips.forEach(ip=>{

let d = fakeDatabase(ip);

out.innerHTML += `
<tr>
<td>${ip}</td>
<td class="${d.status==="Success"?"success":"failed"}">${d.status}</td>
<td>${d.provider}</td>
<td>${d.country}</td>
<td>${d.region}</td>
<td>${d.city}</td>
<td><span class="badge">${d.msg}</span></td>
</tr>`;

});

document.getElementById("info").innerText =
`Done ✔ (${ips.length} IPs processed)`;

}

</script>

</body>
</html>
