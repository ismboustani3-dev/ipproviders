<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IP Checker</title>

<style>

body{
    font-family:Arial;
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:1450px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

textarea{
    width:100%;
    height:220px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 20px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.check{
    background:#2563eb;
    color:white;
}

.download{
    background:#111827;
    color:white;
    margin-left:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
}

th{
    background:#111827;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}

.stats{
    margin-top:25px;
    padding:15px;
    background:#f9fafb;
    border:1px solid #ddd;
    border-radius:8px;
}

.box{
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
    margin-top:10px;
    background:white;
}

.section-title{
    margin-top:25px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

    <h1>IP Provider Checker</h1>

    <textarea
        id="ips"
        placeholder="1.1.1.1&#10;8.8.8.8"
    ></textarea>

    <br>

    <button
        class="check"
        onclick="checkIPs()"
    >
        Check
    </button>

    <button
        class="download"
        onclick="downloadCSV()"
    >
        Download CSV
    </button>

    <div id="loading"></div>

    <div
        class="stats"
        id="stats"
        style="display:none;"
    >

        <h2>Statistics</h2>

        <p>
            Total:
            <span id="total">0</span>
        </p>

        <p>
            Success:
            <span id="success">0</span>
        </p>

        <p>
            Failed:
            <span id="failed">0</span>
        </p>

        <h3 class="section-title">
            Providers Count
        </h3>

        <div id="providers"></div>

        <h3 class="section-title">
            Regions Count
        </h3>

        <div id="regions"></div>

        <h3 class="section-title">
            Regions By Provider
        </h3>

        <div id="providerRegions"></div>

    </div>

    <table>

        <thead>

            <tr>
                <th>IP</th>
                <th>Status</th>
                <th>Provider</th>
                <th>Country</th>
                <th>Region</th>
                <th>City</th>
            </tr>

        </thead>

        <tbody id="tbody"></tbody>

    </table>

</div>

<script>

let results = [];

async function checkIPs(){

    const ips = document
        .getElementById("ips")
        .value
        .split(/\n|,/)
        .map(x => x.trim())
        .filter(x => x);

    if(!ips.length){

        alert("Paste IPs");

        return;
    }

    results = [];

    document.getElementById("tbody").innerHTML = "";

    document.getElementById("loading").innerHTML =
        "Checking...";

    let success = 0;
    let failed = 0;

    let providers = {};
    let regions = {};
    let providerRegions = {};

    for(const ip of ips){

        try{

            const response = await fetch(
                `https://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,query`
            );

            const data = await response.json();

            if(data.status === "success"){

                success++;

                const provider =
                    data.isp || "Unknown";

                const region =
                    data.regionName || "Unknown";

                providers[provider] =
                    (providers[provider] || 0) + 1;

                regions[region] =
                    (regions[region] || 0) + 1;

                if(!providerRegions[provider]){
                    providerRegions[provider] = {};
                }

                providerRegions[provider][region] =
                    (providerRegions[provider][region] || 0) + 1;

                const row = {

                    ip:data.query,
                    status:"Success",
                    provider:provider,
                    country:data.country,
                    region:region,
                    city:data.city
                };

                results.push(row);

                document.getElementById("tbody").innerHTML += `

                    <tr>

                        <td>${row.ip}</td>

                        <td class="success">
                            Success
                        </td>

                        <td>${row.provider}</td>

                        <td>${row.country}</td>

                        <td>${row.region}</td>

                        <td>${row.city}</td>

                    </tr>

                `;

            }else{

                failed++;

                document.getElementById("tbody").innerHTML += `

                    <tr>

                        <td>${ip}</td>

                        <td class="error">
                            Failed
                        </td>

                        <td colspan="4">
                            Invalid IP
                        </td>

                    </tr>

                `;
            }

        }catch(err){

            failed++;

            document.getElementById("tbody").innerHTML += `

                <tr>

                    <td>${ip}</td>

                    <td class="error">
                        Error
                    </td>

                    <td colspan="4">
                        Request failed
                    </td>

                </tr>

            `;
        }
    }

    document.getElementById("loading").innerHTML = "";

    document.getElementById("stats").style.display =
        "block";

    document.getElementById("total").innerText =
        ips.length;

    document.getElementById("success").innerText =
        success;

    document.getElementById("failed").innerText =
        failed;

    showProviders(providers);

    showRegions(regions);

    showProviderRegions(providerRegions);
}

function showProviders(providers){

    document.getElementById("providers").innerHTML = "";

    Object.entries(providers)
    .sort((a,b) => b[1] - a[1])
    .forEach(p => {

        document.getElementById("providers").innerHTML += `

            <div class="box">

                <b>${p[0]}</b>
                :
                ${p[1]} IPs

            </div>

        `;
    });
}

function showRegions(regions){

    document.getElementById("regions").innerHTML = "";

    Object.entries(regions)
    .sort((a,b) => b[1] - a[1])
    .forEach(r => {

        document.getElementById("regions").innerHTML += `

            <div class="box">

                <b>${r[0]}</b>
                :
                ${r[1]} IPs

            </div>

        `;
    });
}

function showProviderRegions(providerRegions){

    document.getElementById("providerRegions").innerHTML = "";

    Object.entries(providerRegions)
    .forEach(provider => {

        let html = `

            <div class="box">

                <h4>${provider[0]}</h4>

        `;

        Object.entries(provider[1])
        .sort((a,b) => b[1] - a[1])
        .forEach(region => {

            html += `

                <div style="margin-top:5px;">

                    ${region[0]}
                    :
                    ${region[1]} IPs

                </div>

            `;
        });

        html += `</div>`;

        document.getElementById(
            "providerRegions"
        ).innerHTML += html;
    });
}

function downloadCSV(){

    if(!results.length){

        alert("No results");

        return;
    }

    let csv =
`IP,Status,Provider,Country,Region,City\n`;

    results.forEach(r => {

        csv +=
`${r.ip},${r.status},${r.provider},${r.country},${r.region},${r.city}\n`;

    });

    const blob = new Blob(
        [csv],
        {
            type:"text/csv"
        }
    );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download = "results.csv";

    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
