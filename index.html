<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reliable IP Checker</title>

<style>
body{font-family:Arial;background:#0b1220;color:white;padding:20px}
.container{max-width:1000px;margin:auto}

textarea{width:100%;height:120px;padding:10px;border-radius:8px}

button{padding:10px 14px;margin-top:10px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer}

table{width:100%;margin-top:15px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #1f2937;font-size:13px}

.success{color:#22c55e;font-weight:bold}
.failed{color:#ef4444;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>⚡ Reliable IP Checker (Fixed)</h2>

<textarea id="ips">8.8.8.8
1.1.1.1
104.26.10.78</textarea>

<button onclick="run()">CHECK</button>

<table>
<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>ISP</th>
<th>Country</th>
<th>Message</th>
</tr>
</thead>

<tbody id="out"></tbody>
</table>

</div>

<script>

// safe fetch (prevents fake N/A)
async function safeFetch(url){
try{
let r = await fetch(url);
if(!r.ok) return null;
return await r.json();
}catch(e){
return null;
}
}

// API 1
async function api1(ip){
let d = await safeFetch("https://ipwho.is/"+ip);
if(d && d.success){
return {
ip,
status:"Success",
isp:d.connection?.isp || "Unknown ISP",
country:d.country || "Unknown",
msg:"ipwho.is"
};
}
return null;
}

// API 2 fallback
async function api2(ip){
let d = await safeFetch("https://ipapi.co/"+ip+"/json/");
if(d && !d.error){
return {
ip,
status:"Success",
isp:d.org || "Unknown ISP",
country:d.country_name || "Unknown",
msg:"ipapi"
};
}
return null;
}

// FINAL resolver (NO fake N/A)
async function resolveIP(ip){

let r1 = await api1(ip);
if(r1) return r1;

let r2 = await api2(ip);
if(r2) return r2;

// REAL failure (not fake N/A)
return {
ip,
status:"Failed",
isp:"Not available",
country:"Not available",
msg:"No API response / blocked / invalid IP"
};
}

async function run(){

let ips = document.getElementById("ips")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

let out = document.getElementById("out");
out.innerHTML = "";

for(let ip of ips){

let r = await resolveIP(ip);

out.innerHTML += `
<tr>
<td>${r.ip}</td>
<td class="${r.status==="Success"?"success":"failed"}">${r.status}</td>
<td>${r.isp}</td>
<td>${r.country}</td>
<td>${r.msg}</td>
</tr>`;
}

}

</script>

</body>
</html>
