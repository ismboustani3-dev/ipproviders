<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Provider Checker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f4f6;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:200px;
    border:1px solid #ccc;
    border-radius:8px;
    padding:12px;
    resize:none;
    font-size:14px;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}

button{
    border:none;
    padding:12px 22px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.check-btn{
    background:#2563eb;
    color:white;
}

.csv-btn{
    background:#111827;
    color:white;
}

.clear-btn{
    background:#dc2626;
    color:white;
}

.tip{
    color:#666;
    font-size:14px;
}

.progress-container{
    margin-top:20px;
    display:none;
}

.progress-bar{
    width:100%;
    height:24px;
    background:#ddd;
    border-radius:30px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:#2563eb;
    transition:0.3s;
}

.progress-text{
    margin-top:8px;
    font-size:14px;
}

.stats{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:#111827;
    color:white;
    padding:18px;
    border-radius:10px;
}

.card h3{
    color:#9ca3af;
    margin-bottom:10px;
    font-size:14px;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

.table-container{
    margin-top:25px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0f172a;
    color:white;
}

th, td{
    padding:14px;
    border-bottom:1px solid #e5e7eb;
    text-align:left;
    font-size:14px;
}

tbody tr:hover{
    background:#f9fafb;
}

.success{
    color:green;
    font-weight:bold;
}

.failed{
    color:red;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#666;
}

</style>

</head>
<body>

<div class="container">

    <h1>IP Provider Checker</h1>

    <p style="margin-bottom:10px;color:#555;">
        Paste IP addresses (one per line)
    </p>

    <textarea id="ipInput">
54.38.193.115
54.37.82.44
37.123.98.2
104.206.148.58
192.99.198.53
170.130.202.238
51.81.187.39
5.135.109.51
51.195.146.50
104.206.108.50
    </textarea>

    <div class="buttons">

        <button class="check-btn" onclick="checkIPs()">
            Check
        </button>

        <button class="csv-btn" onclick="downloadCSV()">
            Download CSV
        </button>

        <button class="clear-btn" onclick="clearResults()">
            Clear
        </button>

        <span class="tip">
            Tip: You can paste comma-separated IPs too.
        </span>

    </div>

    <div class="progress-container" id="progressContainer">

        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <div class="progress-text" id="progressText">
            0%
        </div>

    </div>

    <div class="stats">

        <div class="card">
            <h3>Total IPs</h3>
            <p id="totalIPs">0</p>
        </div>

        <div class="card">
            <h3>Success</h3>
            <p id="successIPs">0</p>
        </div>

        <div class="card">
            <h3>Failed</h3>
            <p id="failedIPs">0</p>
        </div>

        <div class="card">
            <h3>Providers</h3>
            <p id="providersCount">0</p>
        </div>

    </div>

    <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>IP</th>
                    <th>Status</th>
                    <th>ISP</th>
                    <th>Organization</th>
                    <th>ASN</th>
                    <th>Country</th>
                    <th>Region</th>
                    <th>City</th>
                </tr>
            </thead>

            <tbody id="resultsBody"></tbody>

        </table>

    </div>

    <div class="footer">
        @By WMN-3
    </div>

</div>

<script>

let allResults = [];

async function checkIPs(){

    const input = document.getElementById("ipInput").value;

    const ips = input
        .replace(/,/g,"\n")
        .split("\n")
        .map(ip => ip.trim())
        .filter(ip => ip !== "");

    const tbody = document.getElementById("resultsBody");

    tbody.innerHTML = "";

    allResults = [];

    let success = 0;
    let failed = 0;

    let providers = new Set();

    document.getElementById("progressContainer").style.display = "block";

    for(let i = 0; i < ips.length; i++){

        const ip = ips[i];

        try{

            // FREE API
            const response = await fetch(`https://ipwhois.app/json/${ip}`);

            const data = await response.json();

            if(data.success !== false){

                success++;

                providers.add(data.isp || "Unknown");

                const result = {

                    ip: ip,
                    status: "Success",
                    isp: data.isp || "N/A",
                    org: data.org || "N/A",
                    asn: data.asn || "N/A",
                    country: data.country || "N/A",
                    region: data.region || "N/A",
                    city: data.city || "N/A"

                };

                allResults.push(result);

                tbody.innerHTML += `

                    <tr>

                        <td>${result.ip}</td>

                        <td class="success">
                            ${result.status}
                        </td>

                        <td>${result.isp}</td>

                        <td>${result.org}</td>

                        <td>${result.asn}</td>

                        <td>${result.country}</td>

                        <td>${result.region}</td>

                        <td>${result.city}</td>

                    </tr>

                `;

            }else{

                failed++;

                tbody.innerHTML += `

                    <tr>

                        <td>${ip}</td>

                        <td class="failed">
                            Failed
                        </td>

                        <td colspan="6">
                            Invalid IP or API Error
                        </td>

                    </tr>

                `;
            }

        }catch(error){

            failed++;

            tbody.innerHTML += `

                <tr>

                    <td>${ip}</td>

                    <td class="failed">
                        Failed
                    </td>

                    <td colspan="6">
                        Request Failed
                    </td>

                </tr>

            `;
        }

        let percent = Math.round(((i + 1) / ips.length) * 100);

        document.getElementById("progress").style.width = percent + "%";

        document.getElementById("progressText").innerText =
            percent + "% Completed";

        document.getElementById("totalIPs").innerText =
            ips.length;

        document.getElementById("successIPs").innerText =
            success;

        document.getElementById("failedIPs").innerText =
            failed;

        document.getElementById("providersCount").innerText =
            providers.size;

    }
}

function downloadCSV(){

    if(allResults.length === 0){

        alert("No results");

        return;
    }

    let csv =
`IP,Status,ISP,Organization,ASN,Country,Region,City\n`;

    allResults.forEach(r => {

        csv +=
`"${r.ip}","${r.status}","${r.isp}","${r.org}","${r.asn}","${r.country}","${r.region}","${r.city}"\n`;

    });

    const blob = new Blob([csv], {
        type:'text/csv'
    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = "ip_results.csv";

    a.click();

    URL.revokeObjectURL(url);
}

function clearResults(){

    document.getElementById("resultsBody").innerHTML = "";

    document.getElementById("progress").style.width = "0%";

    document.getElementById("progressText").innerText = "0%";

    document.getElementById("totalIPs").innerText = "0";

    document.getElementById("successIPs").innerText = "0";

    document.getElementById("failedIPs").innerText = "0";

    document.getElementById("providersCount").innerText = "0";

    allResults = [];
}

</script>

</body>
</html>
