<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable IP Checker</title>

<style>
body{font-family:Arial;background:#0b1220;color:white;padding:20px}
.container{max-width:1000px;margin:auto}
textarea{width:100%;height:120px;padding:10px}
button{padding:10px 14px;margin-top:10px;background:#3b82f6;color:white;border:none;border-radius:8px;cursor:pointer}

table{width:100%;margin-top:15px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #1f2937;font-size:13px}

.success{color:#22c55e;font-weight:bold}
.failed{color:#ef4444;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>⚡ STABLE IP CHECKER</h2>

<textarea id="ips">8.8.8.8
1.1.1.1</textarea>

<button onclick="run()">CHECK IPs</button>

<table>
<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>ISP</th>
<th>Country</th>
<th>Message</th>
</tr>
</thead>
<tbody id="out"></tbody>
</table>

</div>

<script>

// ⏱ timeout wrapper (important fix)
function timeoutFetch(url, ms=5000){
return Promise.race([
fetch(url),
new Promise((_,rej)=>setTimeout(()=>rej("timeout"),ms))
]);
}

async function api1(ip){
try{
let r = await timeoutFetch("https://ipwho.is/"+ip);
let d = await r.json();

if(d && d.success){
return {
ip,
status:"Success",
isp:d.connection?.isp||"N/A",
country:d.country||"",
msg:"OK (ipwho)"
};
}
}catch(e){}
return null;
}

async function api2(ip){
try{
let r = await timeoutFetch("https://ipapi.co/"+ip+"/json/");
let d = await r.json();

if(d && !d.error){
return {
ip,
status:"Success",
isp:d.org||"N/A",
country:d.country_name||"",
msg:"OK (ipapi)"
};
}
}catch(e){}
return null;
}

async function getIP(ip){

// 1st try
let r1 = await api1(ip);
if(r1) return r1;

// 2nd try
let r2 = await api2(ip);
if(r2) return r2;

// real fail (not fake N/A)
return {
ip,
status:"Failed",
isp:"No response",
country:"",
msg:"API blocked / timeout"
};
}

async function run(){

let ips=document.getElementById("ips")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

let out=document.getElementById("out");
out.innerHTML="";

for(let ip of ips){

let r = await getIP(ip);

out.innerHTML += `
<tr>
<td>${r.ip}</td>
<td class="${r.status==="Success"?"success":"failed"}">${r.status}</td>
<td>${r.isp}</td>
<td>${r.country}</td>
<td>${r.msg}</td>
</tr>`;
}

}

</script>

</body>
</html>
