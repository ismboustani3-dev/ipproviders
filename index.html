<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IP Intelligence Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#3b82f6;
color:white;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#1f2937;
padding:10px;
text-align:left;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #1f2937;
font-size:13px;
}

.success{color:#22c55e;font-weight:bold;}
.failed{color:#ef4444;font-weight:bold;}

small{opacity:.7}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>🚀 IP Intelligence Dashboard</h2>

<textarea id="ips">8.8.8.8
1.1.1.1
104.26.10.78
172.67.73.21</textarea>

<button onclick="check()">RUN CHECK</button>

<small id="stats">0 IPs</small>

</div>

<table>

<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>ISP</th>
<th>Organization</th>
<th>ASN</th>
<th>Country</th>
<th>Region</th>
<th>City</th>
<th>Message</th>
</tr>
</thead>

<tbody id="out"></tbody>

</table>

</div>

<script>

let data=[];

async function getIP(ip){

try{

let r=await fetch("https://ipwho.is/"+ip);
let d=await r.json();

if(d.success){

return{
ip,
status:"Success",
isp:d.connection?.isp || "N/A",
org:d.connection?.org || "N/A",
asn:d.connection?.asn || "N/A",
country:d.country || "",
region:d.region || "",
city:d.city || "",
msg:"OK"
};

}

}catch{}

return{
ip,
status:"Failed",
isp:"N/A",
org:"N/A",
asn:"N/A",
country:"",
region:"",
city:"",
msg:"Error / Invalid"
};

}

async function check(){

let ips=document.getElementById("ips")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

data=[];

for(let ip of ips){
data.push(await getIP(ip));
}

render();

document.getElementById("stats").innerText =
`${data.length} IPs checked`;
}

function render(){

let out=document.getElementById("out");
out.innerHTML="";

data.forEach(x=>{
out.innerHTML+=`
<tr>
<td>${x.ip}</td>
<td class="${x.status==="Success"?"success":"failed"}">${x.status}</td>
<td>${x.isp}</td>
<td>${x.org}</td>
<td>${x.asn}</td>
<td>${x.country}</td>
<td>${x.region}</td>
<td>${x.city}</td>
<td>${x.msg}</td>
</tr>`;
});

}

</script>

</body>
</html>
