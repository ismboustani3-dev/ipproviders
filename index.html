<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PRO IP Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

textarea{
width:100%;
height:110px;
padding:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
outline:none;
resize:none;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn{
background:#3b82f6;
color:white;
}

.btn:hover{background:#2563eb}

input,select{
padding:8px;
border-radius:8px;
border:none;
background:#1f2937;
color:white;
outline:none;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.stat{
background:#0f172a;
padding:10px;
border-radius:10px;
text-align:center;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

th{
background:#1f2937;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #1f2937;
}

.success{color:#22c55e;font-weight:bold;}
.failed{color:#ef4444;font-weight:bold;}

canvas{
background:#111827;
border-radius:12px;
padding:10px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">🚀 PRO IP DASHBOARD</div>
</div>

<div class="grid">

<div class="card">
<textarea id="ips">8.8.8.8
1.1.1.1
104.26.10.78
172.67.73.21</textarea>

<div class="controls">
<button class="btn" onclick="check()">Run Scan</button>
<input id="search" placeholder="Search..." onkeyup="render()">
<select id="filter" onchange="render()">
<option value="all">All</option>
<option value="success">Success</option>
<option value="failed">Failed</option>
</select>
</div>

</div>

<div class="card">
<div class="stat">TOTAL <div id="t">0</div></div>
<div class="stat">SUCCESS <div id="s">0</div></div>
<div class="stat">FAILED <div id="f">0</div></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<table>
<thead>
<tr>
<th>IP</th>
<th>Status</th>
<th>Provider</th>
<th>Country</th>
</tr>
</thead>
<tbody id="out"></tbody>
</table>

</div>

<script>

let data=[];

async function fetchIP(ip){
try{
let r=await fetch("https://ipwho.is/"+ip);
let d=await r.json();

if(d.success){
return{
ip,
status:"Success",
provider:d.connection?.isp||"Unknown",
country:d.country||""
};
}
}catch{}

return{ip,status:"Failed",provider:"Error",country:""};
}

async function check(){

let ips=document.getElementById("ips")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

data=[];

for(let ip of ips){
data.push(await fetchIP(ip));
}

render();
draw();
}

function render(){

let f=document.getElementById("filter").value;
let s=document.getElementById("search").value.toLowerCase();

let out=document.getElementById("out");
out.innerHTML="";

let list=data.filter(x=>{
let ok=f==="all"||x.status.toLowerCase()===f;
let ok2=x.ip.includes(s)||x.provider.toLowerCase().includes(s);
return ok && ok2;
});

list.forEach(x=>{
out.innerHTML+=`
<tr>
<td>${x.ip}</td>
<td class="${x.status==="Success"?"success":"failed"}">${x.status}</td>
<td>${x.provider}</td>
<td>${x.country}</td>
</tr>`;
});

document.getElementById("t").innerText=data.length;
document.getElementById("s").innerText=data.filter(x=>x.status==="Success").length;
document.getElementById("f").innerText=data.filter(x=>x.status==="Failed").length;
}

function draw(){

let ctx=document.getElementById("chart").getContext("2d");

let ok=data.filter(x=>x.status==="Success").length;
let bad=data.filter(x=>x.status==="Failed").length;

new Chart(ctx,{
type:"doughnut",
data:{
labels:["Success","Failed"],
datasets:[{
data:[ok,bad],
backgroundColor:["#22c55e","#ef4444"]
}]
}
});
}

</script>

</body>
</html>
