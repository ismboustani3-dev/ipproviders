<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULTRA IP INTEL CHECKER</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#f3f4f6;
padding:20px;
}

.container{
max-width:1700px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
}

h1{font-size:42px;margin-bottom:20px;}

textarea{
width:340px;height:200px;
border:2px solid #111827;
border-radius:8px;
padding:12px;
}

button{
padding:12px 24px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

#checkBtn{background:#2563eb;color:white;}
#downloadBtn{background:#111827;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.success{color:green;font-weight:bold;}
.failed{color:red;font-weight:bold;}
.loading{color:#2563eb;font-weight:bold;}

</style>
</head>

<body>

<div class="container">

<h1>ULTRA IP INTEL CHECKER</h1>

<textarea id="ipInput">8.8.8.8
1.1.1.1
104.26.10.78
172.67.73.21</textarea>

<div>
<button id="checkBtn">Check IPs</button>
<button id="downloadBtn">Download CSV</button>
</div>

<table>
<thead>
<tr>
<th>IP</th><th>Status</th><th>ISP</th><th>Org</th><th>ASN</th><th>Country</th><th>Region</th><th>City</th><th>Message</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

</div>

<script>

const results=document.getElementById("results");

let csvRows=[];
const cache={};

// ================= SAFE FETCH (REAL FIX) =================
async function fetchAPI(url){

const controller=new AbortController();
const timeout=setTimeout(()=>controller.abort(),7000);

try{
const r=await fetch(url,{signal:controller.signal});
clearTimeout(timeout);

if(!r.ok) return null;

return await r.json();

}catch(e){
clearTimeout(timeout);
return null;
}

}

// ================= RETRY SYSTEM (IMPORTANT FIX) =================
async function safeFetch(url,tries=2){

for(let i=0;i<tries;i++){

let res=await fetchAPI(url);

if(res) return res;

}

return null;

}

// ================= FIXED IP ENGINE =================
async function getIP(ip){

if(cache[ip]) return cache[ip];

let d;

// API 1
d=await safeFetch(`https://ipwho.is/${ip}`);

if(d && d.success===true){

return cache[ip]=format(ip,d.connection?.isp,d.connection?.org,d.connection?.asn,d.country,d.region,d.city,"OK");
}

// API 2
d=await safeFetch(`https://ipapi.co/${ip}/json/`);

if(d && !d.error){

return cache[ip]=format(ip,d.org,d.org,d.asn,d.country_name,d.region,d.city,"OK");
}

// API 3
d=await safeFetch(`https://ipinfo.io/${ip}/json`);

if(d && !d.error){

return cache[ip]=format(ip,d.org,d.org,"N/A",d.country,d.region,d.city,"OK");
}

// FINAL SAFE (NO FAKE N/A PROBLEM)
return {
ip,
status:"Failed",
isp:"Unknown",
org:"Unknown",
asn:"Unknown",
country:"Unknown",
region:"Unknown",
city:"Unknown",
message:"All APIs blocked / timeout"
};

}

// ================= CLEAN FORMAT =================
function format(ip,isp,org,asn,country,region,city,msg){

return{
ip,
status:"Success",
isp:isp||"Unknown",
org:org||"Unknown",
asn:asn||"Unknown",
country:country||"Unknown",
region:region||"Unknown",
city:city||"Unknown",
message:msg
};

}

// ================= MAIN =================
document.getElementById("checkBtn").onclick=async()=>{

results.innerHTML="";
csvRows=[];

let ips=document.getElementById("ipInput")
.value.split("\n").map(x=>x.trim()).filter(Boolean);

for(let ip of ips){

let row=document.createElement("tr");
row.id="row-"+ip.replaceAll(".","-");

row.innerHTML=`
<td>${ip}</td>
<td class="loading">Checking...</td>
<td></td><td></td><td></td><td></td><td></td><td></td><td></td>
`;

results.appendChild(row);

let d=await getIP(ip);

row.innerHTML=`
<td>${d.ip}</td>
<td class="${d.status==="Success"?"success":"failed"}">${d.status}</td>
<td>${d.isp}</td>
<td>${d.org}</td>
<td>${d.asn}</td>
<td>${d.country}</td>
<td>${d.region}</td>
<td>${d.city}</td>
<td>${d.message}</td>
`;

csvRows.push(d);

}

};

// ================= CSV =================
document.getElementById("downloadBtn").onclick=()=>{

let csv="IP,Status,ISP,Org,ASN,Country,Region,City,Message\n";

csvRows.forEach(r=>{
csv+=`${r.ip},${r.status},${r.isp},${r.org},${r.asn},${r.country},${r.region},${r.city},${r.message}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ip_intel.csv";
a.click();

};

</script>

</body>
</html>
