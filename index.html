<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULTRA IP Provider Checker PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    padding:20px;
    transition:0.3s;
}

body.dark{
    background:#0f172a;
    color:white;
}

.container{
    max-width:1700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
}

body.dark .container{
    background:#111827;
}

textarea{
    width:340px;
    height:200px;
    border:2px solid #111827;
    border-radius:8px;
    padding:12px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

#map{
    height:350px;
    margin-top:20px;
    border-radius:10px;
}

.badge{
    background:#111827;
    color:white;
    padding:6px 10px;
    border-radius:20px;
    margin:5px;
    display:inline-block;
}

.dark .badge{
    background:#374151;
}

.duplicate{
    color:orange;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>ULTRA IP CHECKER PRO</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<textarea id="ipInput"></textarea>

<button id="checkBtn">Check</button>
<button id="downloadBtn">CSV</button>

<div id="map"></div>

<table border="1" width="100%" style="margin-top:20px">
<thead>
<tr>
<th>IP</th><th>Status</th><th>Provider</th><th>Country</th><th>Region</th><th>City</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let cache = {};
let csvRows = [];
let ipSet = new Set(JSON.parse(localStorage.getItem("ips")||"[]"));

function toggleDark(){
    document.body.classList.toggle("dark");
    localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if(localStorage.getItem("dark")==="true"){
    document.body.classList.add("dark");
}

async function getIP(ip){

if(cache[ip]) return cache[ip];

let r = await fetch(`https://ipwho.is/${ip}`);
let d = await r.json();

let result = {
ip,
status:d.success ? "Success":"Failed",
provider:d.connection?.isp || "Unknown",
country:d.country,
region:d.region,
city:d.city,
lat:d.latitude,
lon:d.longitude
};

cache[ip]=result;
return result;
}

document.getElementById("checkBtn").onclick = async ()=>{

let ips = document.getElementById("ipInput").value.split("\n").map(i=>i.trim()).filter(Boolean);

localStorage.setItem("ips", JSON.stringify(ips));

document.getElementById("results").innerHTML = "";
csvRows=[];

let duplicates = {};

for(let ip of ips){

duplicates[ip]=(duplicates[ip]||0)+1;

let data = await getIP(ip);

let isDup = duplicates[ip]>1;

let row = `<tr>
<td>${ip}</td>
<td>${isDup ? "<span class='duplicate'>Duplicate</span>" : data.status}</td>
<td>${data.provider}</td>
<td>${data.country}</td>
<td>${data.region}</td>
<td>${data.city}</td>
</tr>`;

document.getElementById("results").innerHTML += row;

csvRows.push(data);

if(data.lat && data.lon){
L.marker([data.lat,data.lon]).addTo(map)
.bindPopup(ip);
}

}

}

document.getElementById("downloadBtn").onclick = ()=>{

let csv="IP,Status,Provider,Country,Region,City\n";

csvRows.forEach(r=>{
csv+=`${r.ip},${r.status},${r.provider},${r.country},${r.region},${r.city}\n`;
});

let blob = new Blob([csv],{type:"text/csv"});
let url = URL.createObjectURL(blob);
let a=document.createElement("a");
a.href=url;
a.download="ips.csv";
a.click();
}

</script>

</body>
</html>
