<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IP Checker Lite</title>

<style>
body{font-family:Arial;background:#f3f4f6;padding:20px;transition:.3s}
.dark{background:#0f172a;color:#fff}
.container{max-width:1200px;margin:auto;background:#fff;padding:15px;border-radius:10px}
.dark .container{background:#111827}
textarea{width:100%;height:120px;padding:10px}
button,select{padding:8px;margin:5px}
table{width:100%;border-collapse:collapse;margin-top:15px}
td,th{padding:8px;border-bottom:1px solid #ddd}
.success{color:green;font-weight:bold}
.failed{color:red;font-weight:bold}
.copy{background:#333;color:#fff;padding:4px 6px;border:none;cursor:pointer}
</style>
</head>

<body>

<div class="container">
<h2>IP Checker Lite</h2>

<button onclick="toggleDark()">🌙</button>
<textarea id="ips">8.8.8.8
1.1.1.1
104.26.10.78</textarea>

<br>

<button onclick="check()">Check</button>
<button onclick="downloadCSV()">CSV</button>
<button onclick="downloadJSON()">JSON</button>
<button onclick="clearAll()">Clear</button>

<select id="filter" onchange="render()">
<option value="all">All</option>
<option value="success">Success</option>
<option value="failed">Failed</option>
</select>

<p>Total: <span id="t">0</span> | Success: <span id="s">0</span> | Failed: <span id="f">0</span></p>

<table>
<thead>
<tr>
<th>IP</th><th>Status</th><th>Provider</th><th>Country</th><th>Action</th>
</tr>
</thead>
<tbody id="out"></tbody>
</table>

</div>

<script>

let data = JSON.parse(localStorage.getItem("ip")||"[]");

function save(){localStorage.setItem("ip",JSON.stringify(data))}

function toggleDark(){document.body.classList.toggle("dark")}

function valid(ip){
return /^((25[0-5]|2[0-4]\d|1?\d?\d)\.){3}(25[0-5]|2[0-4]\d|1?\d?\d)$/.test(ip)
}

async function get(ip){
try{
let r=await fetch("https://ipwho.is/"+ip);
let d=await r.json();
if(d.success)return{ip,status:"Success",provider:d.connection?.isp||"N/A",country:d.country}
}catch{}
return{ip,status:"Failed",provider:"Error",country:""}
}

async function check(){
let ips=document.getElementById("ips").value.split("\n").map(x=>x.trim()).filter(Boolean)
data=[]
for(let ip of ips){
let r=valid(ip)?await get(ip):{ip,status:"Failed",provider:"Invalid",country:""}
data.push(r)
save()
render()
}
}

function render(){
let f=document.getElementById("filter").value
let out=document.getElementById("out")
out.innerHTML=""
let list=data.filter(x=>f==="all"?1:x.status.toLowerCase()===f)

let s=0,f2=0

list.forEach(x=>{
x.status==="Success"?s++:f2++
out.innerHTML+=`
<tr>
<td>${x.ip}</td>
<td class="${x.status==="Success"?"success":"failed"}">${x.status}</td>
<td>${x.provider}</td>
<td>${x.country}</td>
<td><button class="copy" onclick="navigator.clipboard.writeText('${x.ip}')">Copy</button></td>
</tr>`
})

document.getElementById("t").innerText=data.length
document.getElementById("s").innerText=s
document.getElementById("f").innerText=f2
}

function downloadCSV(){
let c="IP,Status,Provider,Country\n"
data.forEach(x=>c+=`${x.ip},${x.status},${x.provider},${x.country}\n`)
let b=new Blob([c],{type:"text/csv"})
let a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download="ips.csv"
a.click()
}

function downloadJSON(){
let b=new Blob([JSON.stringify(data)],{type:"application/json"})
let a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download="ips.json"
a.click()
}

function clearAll(){
data=[]
save()
render()
}

render()

</script>

</body>
</html>
