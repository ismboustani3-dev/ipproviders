<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced IP Provider Checker</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    padding:20px;
    margin:0;
}

.container{
    max-width:1500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:20px;
    color:#111827;
}

textarea{
    width:100%;
    height:220px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    resize:vertical;
    font-size:14px;
    box-sizing:border-box;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:15px;
    font-size:14px;
    transition:0.2s;
}

button:hover{
    opacity:0.9;
}

.check{
    background:#2563eb;
    color:white;
}

.download{
    background:#111827;
    color:white;
    margin-left:10px;
}

input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-top:15px;
    width:300px;
    font-size:14px;
}

.progress-container{
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:30px;
    margin-top:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#2563eb;
    transition:0.2s;
    text-align:center;
    color:white;
    line-height:25px;
    font-size:13px;
}

.stats{
    margin-top:20px;
    padding:15px;
    background:#f9fafb;
    border-radius:8px;
    border:1px solid #ddd;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
}

th{
    background:#111827;
    color:white;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
    font-size:14px;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <h1>Advanced IP Provider Checker</h1>

    <textarea
        id="ips"
        placeholder="1.1.1.1&#10;8.8.8.8"
    ></textarea>

    <br>

    <button
        class="check"
        onclick="checkIPs()"
    >
        Start Check
    </button>

    <button
        class="download"
        onclick="downloadCSV()"
    >
        Download CSV
    </button>

    <br>

    <input
        type="text"
        id="search"
        placeholder="Search provider / country / region"
        onkeyup="filterResults()"
    >

    <div class="progress-container">

        <div
            class="progress-bar"
            id="progressBar"
        >
            0%
        </div>

    </div>

    <div class="stats">

        <p>
            Checked:
            <span id="checked">0</span>
        </p>

        <p>
            Success:
            <span id="success">0</span>
        </p>

        <p>
            Failed:
            <span id="failed">0</span>
        </p>

    </div>

    <table>

        <thead>

            <tr>
                <th>IP</th>
                <th>Status</th>
                <th>Provider</th>
                <th>Country</th>
                <th>Region</th>
                <th>City</th>
            </tr>

        </thead>

        <tbody id="tbody"></tbody>

    </table>

</div>

<script>

let results = [];

async function checkIPs(){

    const ips = document
        .getElementById("ips")
        .value
        .split(/\n|,/)
        .map(x => x.trim())
        .filter(x => x);

    if(!ips.length){

        alert("Paste IPs");

        return;
    }

    results = [];

    document.getElementById("tbody").innerHTML = "";

    let checked = 0;
    let success = 0;
    let failed = 0;

    updateStats(
        checked,
        success,
        failed
    );

    updateProgress(0);

    for(const ip of ips){

        try{

            const response = await fetch(
                `https://corsproxy.io/?https://ipwho.is/${ip}`
            );

            const data = await response.json();

            checked++;

            if(data.success !== false){

                success++;

                const row = {

                    ip:data.ip || ip,
                    status:"Success",
                    provider:data.connection?.isp || "Unknown",
                    country:data.country || "-",
                    region:data.region || "-",
                    city:data.city || "-"
                };

                results.push(row);

                addRow(row);

            }else{

                failed++;

                addErrorRow(ip);
            }

        }catch(error){

            checked++;

            failed++;

            addErrorRow(ip);
        }

        updateStats(
            checked,
            success,
            failed
        );

        updateProgress(
            Math.floor(
                (checked / ips.length) * 100
            )
        );
    }

    alert("Check Finished");
}

function addRow(row){

    document.getElementById("tbody").innerHTML += `

    <tr>

        <td>${row.ip}</td>

        <td class="success">
            Success
        </td>

        <td>${row.provider}</td>

        <td>${row.country}</td>

        <td>${row.region}</td>

        <td>${row.city}</td>

    </tr>

    `;
}

function addErrorRow(ip){

    document.getElementById("tbody").innerHTML += `

    <tr>

        <td>${ip}</td>

        <td class="error">
            Failed
        </td>

        <td colspan="4">
            API Error / Invalid IP
        </td>

    </tr>

    `;
}

function updateProgress(percent){

    const bar =
        document.getElementById("progressBar");

    bar.style.width =
        percent + "%";

    bar.innerText =
        percent + "%";
}

function updateStats(
    checked,
    success,
    failed
){

    document.getElementById("checked")
        .innerText = checked;

    document.getElementById("success")
        .innerText = success;

    document.getElementById("failed")
        .innerText = failed;
}

function filterResults(){

    const value =
        document.getElementById("search")
        .value
        .toLowerCase();

    const rows =
        document.querySelectorAll("#tbody tr");

    rows.forEach(row => {

        if(
            row.innerText
            .toLowerCase()
            .includes(value)
        ){

            row.style.display = "";

        }else{

            row.style.display = "none";
        }
    });
}

function downloadCSV(){

    if(!results.length){

        alert("No results");

        return;
    }

    let csv =
`IP,Status,Provider,Country,Region,City\n`;

    results.forEach(r => {

        csv +=
`${r.ip},${r.status},${r.provider},${r.country},${r.region},${r.city}\n`;

    });

    const blob = new Blob(
        [csv],
        {
            type:"text/csv"
        }
    );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download =
        "results.csv";

    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
